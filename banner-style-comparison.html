<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoC Banner Style Comparison</title>
<style>
  :root {
    --bg:#06070b;
    --text:#eef2ff;
    --panel:rgba(17,22,35,.94);
    --stroke:rgba(255,255,255,.12);
    --accent:#f6c945;
  }
  html,
  body {
    margin:0;
    min-height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
  }
  .page {
    min-height:100vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    padding:28px;
    box-sizing:border-box;
  }
  .sample {
    position:relative;
    min-height:520px;
    border:1px solid rgba(255,255,255,.12);
    background:
      linear-gradient(90deg, rgba(23,72,44,.85) 0 24%, rgba(153,146,39,.85) 24% 47%, rgba(92,25,27,.85) 47% 70%, rgba(26,62,95,.85) 70% 100%);
    box-shadow:inset 0 0 0 4px #000;
    overflow:hidden;
  }
  .label {
    position:absolute;
    left:16px;
    top:14px;
    z-index:3;
    padding:6px 10px;
    border-radius:10px;
    background:rgba(0,0,0,.72);
    color:#fff;
    font-size:13px;
    font-weight:900;
  }
  .banner {
    position:absolute;
    left:0;
    right:0;
    top:50%;
    transform:translateY(-50%);
    margin:0 auto;
    text-align:center;
  }
  .current-card {
    box-sizing:border-box;
    width:100%;
    padding:22px 26px;
    border-radius:20px;
    border-top:2px solid rgba(255,230,140,.72);
    border-bottom:2px solid rgba(255,230,140,.72);
    border-left:1px solid rgba(255,230,140,.28);
    border-right:1px solid rgba(255,230,140,.28);
    background:linear-gradient(180deg, rgba(17,22,35,.97), rgba(28,18,10,.95));
    color:#fff7cf;
    box-shadow:0 18px 44px rgba(0,0,0,.48), inset 0 0 0 1px rgba(255,255,255,.08);
    backdrop-filter:blur(3px);
  }
  .current-title {
    color:#ffe38a;
    text-transform:uppercase;
    letter-spacing:.08em;
    font-weight:950;
    font-size:22px;
  }
  .current-sub {
    margin-top:10px;
    color:rgba(238,242,255,.72);
    font-size:15px;
  }
  .current-btn {
    min-width:180px;
    margin-top:14px;
    border:none;
    border-radius:14px;
    padding:10px 12px;
    font-weight:950;
    background:var(--accent);
    color:#0a0d14;
    cursor:pointer;
  }

  .rev266-card {
    box-sizing:border-box;
    width:100%;
    padding:16px 22px 18px;
    border-radius:20px;
    border:2px solid rgba(255,230,140,.72);
    background:linear-gradient(180deg, rgba(17,22,35,.97), rgba(28,18,10,.95));
    color:#fff7cf;
    box-shadow:0 18px 44px rgba(0,0,0,.48), inset 0 0 0 1px rgba(255,255,255,.08);
    backdrop-filter:blur(3px);
  }
  .rev266-title {
    font-size:15px;
    line-height:1.08;
    font-weight:1000;
    letter-spacing:.12em;
    text-transform:uppercase;
    opacity:.94;
    color:#ffe38a;
    text-shadow:0 1px 0 rgba(0,0,0,.45);
  }
  .rev266-sub {
    margin-top:8px;
    font-size:33px;
    line-height:1.08;
    font-weight:1000;
    letter-spacing:.01em;
    color:#fff7cf;
    text-shadow:0 2px 0 rgba(0,0,0,.42);
    word-break:break-word;
  }
  .rev266-btn {
    min-width:180px;
    margin-top:14px;
    border-radius:14px;
    border:2px solid rgba(255,230,140,.68);
    background:linear-gradient(180deg, rgba(87,62,15,.96), rgba(41,27,8,.96));
    color:#fff7cf;
    font-weight:900;
    font-size:18px;
    letter-spacing:.05em;
    padding:10px 12px;
    box-shadow:0 8px 20px rgba(0,0,0,.34), inset 0 0 0 1px rgba(255,255,255,.06);
    cursor:pointer;
  }
  @media (max-width:900px) {
    .page { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
  <main class="page">
    <section class="sample">
      <div class="label">Current live skin</div>
      <div class="banner current-card">
        <div class="current-title">Stockpile Placement Complete!</div>
        <div class="current-sub">Press Return to continue.</div>
        <button class="current-btn">Continue</button>
      </div>
    </section>

    <section class="sample">
      <div class="label">rev266 injected v85 skin</div>
      <div class="banner rev266-card">
        <div class="rev266-title">Stockpile Placement Complete!</div>
        <div class="rev266-sub">Press Return to continue.</div>
        <button class="rev266-btn">Continue</button>
      </div>
    </section>
  </main>
</body>
</html>
