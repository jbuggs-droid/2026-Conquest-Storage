<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Selection Complete Banner Sample</title>
<style>
  html,
  body {
    margin: 0;
    min-height: 100%;
    background: #05070b;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
  }

  .mock-board {
    position: fixed;
    inset: 32px;
    border: 2px solid rgba(255,255,255,.12);
    background:
      linear-gradient(90deg, rgba(27,76,44,.85) 0 25%, rgba(159,151,39,.85) 25% 50%, rgba(94,27,27,.85) 50% 75%, rgba(25,61,91,.85) 75% 100%);
    box-shadow: inset 0 0 0 4px #000;
  }

  /* 1. The Full-Screen Dimming */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  /* 2. The Horizontal Banner (The "Stockpile" Look) */
  .banner-content {
    width: 100%;
    background: #1a1a1a;
    text-align: center;
    padding: 40px 0;
    border-top: 4px solid #ffd700;
    border-bottom: 4px solid #ffd700;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
  }

  /* 3. Typography & Button */
  .banner-title {
    color: #ffd700;
    font-size: 3.5rem;
    font-weight: 900;
    margin: 0;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .banner-subtitle {
    color: #ffffff;
    font-size: 1.2rem;
    margin: 15px 0 25px 0;
    opacity: 0.9;
  }

  .continue-btn {
    background: #ffd700;
    color: #000;
    border: none;
    padding: 12px 40px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }

  .continue-btn:hover {
    background: #ffec8b;
    transform: scale(1.05);
  }
</style>
</head>
<body>
  <div class="mock-board" aria-hidden="true"></div>

  <div id="selection-complete-banner" class="modal-overlay">
    <div class="banner-content">
      <h2 class="banner-title">SELECTION COMPLETE!</h2>
      <p class="banner-subtitle">Press Enter/Return or click Continue to proceed.</p>
      <button class="continue-btn">Continue</button>
    </div>
  </div>
</body>
</html>
